version: "3.9"

services:

  lms-frontend:
    build:
      context: ./client

    ports:
      - "3000:3000"

    depends_on:
      - lms-backend

    env_file:
      - ./client/.env
    networks:
      - lms-network

  lms-backend:
    build:
      context: ./server

    ports:
      - "5000:5000"

    env_file:
      - ./server/.env
    networks:
      - lms-network

networks:
  lms-network:
    driver: bridge